# ── HTTP: ACME challenge + redirect a HTTPS ────────────────────────
server {
    listen 80;
    server_name api.norwestds.com crm.norwestds.com;

    # Certbot coloca el challenge aquí
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: APIs ────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.norwestds.com;

    ssl_certificate     /etc/letsencrypt/live/api.norwestds.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.norwestds.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # portal-api (Express — rutas /api/portal/*)
    location /api/ {
        proxy_pass              http://portal-api:8787;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
    }

    # designpro-api (rutas /designpro/* y /health)
    location /designpro/ {
        proxy_pass              http://designpro-api:8788;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        client_max_body_size    50m;
        proxy_read_timeout      120s;
    }

    # archivos generados por el worker
    location /files/ {
        proxy_pass              http://designpro-api:8788;
        proxy_set_header        Host              $host;
        proxy_cache_bypass      1;
    }

    location /health {
        proxy_pass http://portal-api:8787;
    }
}

# ── HTTPS: CRM (Odoo) ─────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name crm.norwestds.com;

    ssl_certificate     /etc/letsencrypt/live/crm.norwestds.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.norwestds.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 200m;

    # Odoo web
    location / {
        proxy_pass              http://odoo:8069;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_redirect          off;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade           $http_upgrade;
        proxy_set_header        Connection        "upgrade";
        proxy_read_timeout      720s;
        proxy_connect_timeout   720s;
        proxy_send_timeout      720s;
    }

    # Odoo long-polling (notificaciones en tiempo real)
    location /longpolling/ {
        proxy_pass              http://odoo:8072;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
    }
}

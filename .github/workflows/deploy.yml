name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /srv/norwestds

            echo "── git pull ──────────────────────────────────"
            git pull origin main

            echo "── docker build ──────────────────────────────"
            docker compose build --parallel

            echo "── docker up ─────────────────────────────────"
            docker compose up -d

            echo "── cleanup ───────────────────────────────────"
            docker image prune -f

            echo "── done ✓ ────────────────────────────────────"
